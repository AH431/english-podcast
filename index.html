<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast_en - English Learning Backup</title>
    
    <!-- 麥克風 Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: #ffffff;
            --accent: #3498db;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --card-bg: #1e1e1e;
                --accent: #5dade2;
            }
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        .logo { font-size: 3.8rem; margin-bottom: 10px; }
        h1 { 
            font-size: 2.5rem; 
            margin: 0 0 10px 0; 
            color: var(--accent); 
        }
        .subtitle { 
            font-size: 1.15rem; 
            opacity: 0.85; 
            margin-bottom: 30px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        .card i {
            font-size: 2.8rem;
            color: var(--accent);
            margin-bottom: 18px;
        }
        .card h3 {
            margin: 0 0 12px 0;
            font-size: 1.4rem;
        }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 10px;
        }
        .btn:hover {
            background: #2980b9;
        }
        footer {
            text-align: center;
            margin-top: 70px;
            opacity: 0.75;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🎙️</div>
            <h1>Podcast_en</h1>
            <p class="subtitle">English Learning Backup Materials</p>
            <p>這是我的英文學習 Podcast 備份資料庫，包含音檔與完整文字稿。</p>
        </header>

        <div class="cards">
            <div class="card">
                <i class="fas fa-key"></i>
                <h3>Key_Confident_en</h3>
                <p>關鍵表達與實用句型</p>
                <a href="Key_Confident_en/" class="btn" target="_blank">前往瀏覽</a>
            </div>

            <div class="card">
                <i class="fas fa-file-alt"></i>
                <h3>Transcripts_Confident_en</h3>
                <p>完整逐字稿與學習筆記</p>
                <a href="Transcripts_Confident_en/" class="btn" target="_blank">前往瀏覽</a>
            </div>

            <div class="card">
                <i class="fas fa-music"></i>
                <h3>Audio Files</h3>
                <p>所有 Podcast 音檔</p>
                <a href="audio/" class="btn" target="_blank">前往聆聽</a>
            </div>
        </div>

        <footer>
            <p>最後更新：2026 年 4 月</p>
            <p>English Learning Resources • Powered by GitHub Pages</p>
        </footer>
    </div>
</body>
</html>
